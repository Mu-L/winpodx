name: OBS Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach RPMs to (e.g. v0.1.0)"
        required: true

env:
  OBS_PROJECT: home:Kernalix7
  OBS_PACKAGE: winpodx
  OBS_API: https://api.opensuse.org
  # /public/ is OBS's anonymous read-only API mirror — no auth needed for
  # public home: projects. The runservice token can't read /build/.
  OBS_PUBLIC_API: https://api.opensuse.org/public
  OBS_DOWNLOAD: https://download.opensuse.org/repositories/home:/Kernalix7

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${{ github.ref_name }}"
          else
            tag="${{ inputs.tag }}"
          fi
          # OBS feeds the version into both deb and rpm specs; rpm forbids
          # '-' in Version: (Version/Release delimiter). Strip the RTM
          # gate suffix so `0.3.0-RTM1` lands as `0.3.0`.
          version="${tag#v}"
          version="${version%%-RTM*}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install curl + jq
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: Trigger OBS service run (token)
        # On tag push: OBS hasn't seen the new tag yet — `runservice` makes
        # it re-fetch the source, generate a fresh tarball, and start a full
        # rebuild across every (repo, arch) combination (~30-60 min on
        # shared OBS infrastructure). That's the only path that produces
        # RPMs for a fresh tag.
        #
        # On workflow_dispatch: we're re-running the workflow against a tag
        # OBS has already built (e.g. to repopulate Release assets after a
        # workflow-side fix). Triggering another full rebuild here is pure
        # waste — the wait-loop downstream would sit through the entire
        # rebuild even though the RPMs we'd end up downloading would be
        # byte-identical. Skip the trigger so the wait-loop immediately
        # observes the existing terminal state.
        #
        # If a re-dispatch genuinely does need a fresh rebuild (e.g. OBS
        # has cached a broken build), set the OBS_FORCE_REBUILD environment
        # at workflow level or click "Re-run all jobs" — the push-event
        # branch above handles that flow already.
        if: github.event_name == 'push'
        env:
          OBS_TOKEN: ${{ secrets.OBS_TOKEN }}
        run: |
          if [ -z "$OBS_TOKEN" ]; then
            echo "OBS_TOKEN secret is not set" >&2
            exit 1
          fi
          curl -sS -f -X POST \
            -H "Authorization: Token $OBS_TOKEN" \
            "$OBS_API/trigger/runservice?project=$OBS_PROJECT&package=$OBS_PACKAGE"

      - name: Skip OBS service trigger (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "workflow_dispatch — assuming OBS already has ${{ steps.tag.outputs.tag }} built."
          echo "If you need a forced rebuild, push a new tag or click 'Re-run all jobs' on the original tag-push run."

      - name: Wait for OBS build to finish
        run: |
          deadline=$(( $(date +%s) + 60 * 60 ))
          sleep 30
          while :; do
            now=$(date +%s)
            if [ "$now" -ge "$deadline" ]; then
              echo "Timed out waiting for OBS build" >&2
              curl -sS "$OBS_PUBLIC_API/build/$OBS_PROJECT/_result?package=$OBS_PACKAGE" || true
              exit 1
            fi

            xml=$(curl -sS -f "$OBS_PUBLIC_API/build/$OBS_PROJECT/_result?package=$OBS_PACKAGE" || true)
            if [ -z "$xml" ]; then
              sleep 20
              continue
            fi

            # Only look at per-package <status package="winpodx" code="..."/>.
            # Repo-level <result ... code="broken"> (e.g. "nothing provides rpm"
            # on Factory PowerPC/Slowroll aarch64) is OBS infrastructure noise
            # that must not fail our publish job.
            codes=$(echo "$xml" \
              | grep -oP '<status package="winpodx"[^>]*code="\K[^"]+' \
              | sort -u | tr '\n' ' ')
            echo "current package codes: $codes"

            if [ -z "$codes" ]; then
              sleep 30
              continue
            fi

            # `blocked` removed from the pending list: OBS leaves niche
            # arches (e.g. openSUSE_Factory_RISCV riscv64) in `blocked` state
            # indefinitely while waiting on deps that never resolve on that
            # arch. We don't ship RISCV / Factory PowerPC / niche arches, so
            # waiting for them is pointless — the download step only fetches
            # RPMs that actually built. Mirror the `broken` handling below.
            pending=$(echo " $codes " | grep -oE ' (scheduled|dispatching|building|signing|finished) ' || true)
            if [ -n "$pending" ]; then
              sleep 30
              continue
            fi

            # `broken` shows up at the per-package level when OBS hits a
            # repo-level "unresolvable preinstalls: nothing provides rpm"
            # condition on niche archs (Slowroll aarch64, Factory PowerPC
            # ppc64, etc.). The package itself isn't broken — OBS just
            # can't bootstrap a buildroot for that arch. Treat `broken` as
            # infrastructure noise and only fail on `failed` (actual build
            # failure) or `unresolvable` (real dependency mismatch). The
            # repos we actually ship will still publish.
            failed=$(echo " $codes " | grep -oE ' (failed|unresolvable) ' || true)
            if [ -n "$failed" ]; then
              echo "OBS build has package-level failures:" >&2
              echo "$xml" >&2
              exit 1
            fi
            broken_only=$(echo " $codes " | grep -oE ' broken ' || true)
            if [ -n "$broken_only" ]; then
              echo "Note: some archs/repos returned 'broken' (OBS infra noise — ignored):" >&2
              echo "$xml" >&2
            fi
            break
          done

      - name: Discover repos and download RPMs
        run: |
          mkdir -p dist-rpms

          # Parse enabled repos from project _meta (public, no auth)
          meta=$(curl -sS -f "$OBS_PUBLIC_API/source/$OBS_PROJECT/_meta")
          repos=$(echo "$meta" | grep -oP '(?<=<repository name=")[^"]+')
          if [ -z "$repos" ]; then
            echo "No repositories configured on $OBS_PROJECT" >&2
            exit 1
          fi

          for repo in $repos; do
            # openSUSE_Factory_{ARM,PowerPC,RISCV,zSystems} builds the same
            # noarch content as openSUSE_Tumbleweed — publishing all five would
            # just list four identical RPMs with misleading architecture-looking
            # names. Skip the non-x86 Factory rebuilds; Tumbleweed users on
            # aarch64/ppc64/riscv64/s390x install the Tumbleweed noarch RPM.
            case "$repo" in
              openSUSE_Factory_*) echo "Skipping $repo (noarch duplicate of Tumbleweed)"; continue ;;
            esac
            # Tumbleweed / Fedora / Slowroll all produce the same filename
            # (winpodx-<ver>-<rel>.noarch.rpm) because their release tags lack
            # a distro suffix. Without renaming, only the last-iterated repo's
            # file survives in dist-rpms/. Append the repo name to every RPM so
            # each distro's build gets a stable, unique asset name on the
            # Release — matches the RHEL convention (.el9.rpm / .el10.rpm).
            # Normalize short Leap repo names ("15.6", "16.0") to the familiar
            # openSUSE_Leap_* form so the final filename is self-describing
            # instead of ending in a bare version number like ".15.6.rpm".
            case "$repo" in
              1[0-9].[0-9]|1[0-9].[0-9][0-9]) repo_slug="openSUSE_Leap_$repo" ;;
              *)                              repo_slug=$(echo "$repo" | tr '/:' '__') ;;
            esac
            for arch in x86_64 noarch; do
              base="$OBS_DOWNLOAD/$repo/$arch"
              # MirrorCache listing hrefs have a "./" prefix
              # (href="./winpodx-<ver>-<rel>.noarch.rpm"); match the filename
              # directly instead of anchoring on `href="winpodx-`.
              listing=$(curl -sSL "$base/" || true)
              [ -z "$listing" ] && continue
              rpms=$(echo "$listing" | grep -oE 'winpodx-[^"]+\.rpm' | sort -u)
              for f in $rpms; do
                case "$f" in
                  *debuginfo*|*debugsource*|*.src.rpm) continue ;;
                esac
                out="dist-rpms/${f%.rpm}.${repo_slug}.rpm"
                echo "Fetching $repo/$arch/$f -> $(basename "$out")"
                curl -sS -fL -o "$out" "$base/$f" || true
              done
            done
          done

          ls -la dist-rpms/
          if ! ls dist-rpms/*.rpm >/dev/null 2>&1; then
            echo "No RPMs were downloaded" >&2
            exit 1
          fi

      # Publish workflows and release.yml run in parallel on tag push. If this job
      # finishes before release.yml creates the GitHub Release, `gh release upload`
      # fails with "release not found". Create a minimal release here if it doesn't
      # exist yet; release.yml's softprops/action-gh-release will populate title,
      # notes, and sdist/wheel when it completes.
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          gh release view "$tag" >/dev/null 2>&1 \
            || gh release create "$tag" \
                 --title "$tag" \
                 --notes "Release artifacts — see CHANGELOG.md for details."

      - name: Attach RPMs to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" dist-rpms/*.rpm --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ steps.tag.outputs.version }}
          path: dist-rpms/
